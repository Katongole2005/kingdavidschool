<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Dashboard</title>
  <link rel="stylesheet" href="assets\css\dashboard.css">
</head>
<body>
  <header>
    <h1>King David School Dashboard</h1>
    <nav>
      <ul>
        <li><a href="#" data-view="parents">Parents</a></li>
        <li><a href="#" data-view="teachers">Teachers</a></li>
        <li><a href="#" data-view="admin">Admin</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <!-- Parents Section -->
    <section id="parents" class="view">
      <h2>Parents Portal</h2>
      <p>Enroll your child, view school info, and contact staff.</p>
    </section>

    <!-- Teachers Section -->
    <section id="teachers" class="view">
      <h2>Teachers Portal</h2>
      <p>Take attendance, access teaching resources, and announcements.</p>
    </section>

    <!-- Admin Section -->
    <section id="admin" class="view">
      <h2>Admin Dashboard</h2>
      <p>Manage enrollments, view stats, and control site content.</p>
    </section>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
<!-- End of dashboard.html -->
